# Render Blueprint for the Kalqy NestJS backend.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# creates the service; you then fill in the secret env vars (sync: false) in the
# dashboard. The frontend deploys separately on Vercel.
services:
  - type: web
    name: kalqy-backend
    runtime: node
    rootDir: backend
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /api/v1/health
    # --include=dev forces devDependencies (nest CLI, typescript) to install
    # even though NODE_ENV=production would otherwise skip them.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # --- secrets: set these in the Render dashboard (never committed) ---
      - key: DATABASE_URL # Neon POOLED url (host has -pooler)
        sync: false
      - key: DIRECT_URL # Neon DIRECT url (no -pooler)
        sync: false
      - key: REDIS_URL # Upstash rediss://... url
        sync: false
      - key: CORS_ORIGIN # your Vercel origin, e.g. https://kids-game-mu.vercel.app
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_DEVICE_SECRET
        sync: false
      - key: AI_API_KEY # optional; leave blank for rule-based insights
        sync: false
